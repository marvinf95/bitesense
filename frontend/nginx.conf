server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Backend API + health probes. The frontend ingress is the single entry point
    # for the browser; nginx forwards anything not served by the SPA to the Go
    # backend Service inside the cluster.
    location /api/ {
        proxy_pass http://bitesense-backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 16m;
    }

    location = /livez {
        proxy_pass http://bitesense-backend/livez;
    }
    location = /readyz {
        proxy_pass http://bitesense-backend/readyz;
    }

    # Cached static assets.
    location ~* \.(?:js|css|woff2?|ttf|otf|png|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all other paths serve index.html so the Flutter router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
