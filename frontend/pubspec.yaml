name: bitesense
description: BiteSense — food diary for spotting intolerances.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Networking + secure storage
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  # Local DB
  drift: ^2.20.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Pickers / scanners
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3

  # Charts (correlation visualisations)
  fl_chart: ^1.2.0

  # Logging
  logger: ^2.4.0

  # JSON helpers
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
