name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -o /tmp/bitesense-server ./cmd/server

  frontend:
    name: Frontend (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Generate l10n
        # ARB → Dart bindings under lib/l10n/generated/. `flutter pub get` runs the
        # generator on some Flutter versions but not all CI images, so do it
        # explicitly before any analyzer step depends on the generated files.
        # The generator emits unformatted output; run dart format on it first so
        # the format check below stays strict on hand-written code only.
        run: |
          flutter gen-l10n
          dart format lib/l10n/generated/

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Test
        run: flutter test --coverage

      - name: Build web
        # Bake the prod API base-URL into the bundle so the artifact the Pi
        # downloads is deploy-ready (no rebuild on the Pi).
        run: flutter build web --release --base-href / --dart-define=BITESENSE_API=https://bitesense.tailb969ce.ts.net

      - name: Upload web bundle (consumed by Pi auto-deploy)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ github.sha }}
          path: frontend/build/web/
          retention-days: 14

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
