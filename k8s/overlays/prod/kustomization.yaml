apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bitesense
resources:
  - ../../base
  - sealed-secrets.yaml          # The real SealedSecret (generated via kubeseal).

# Drop the placeholder Secret from base — replaced by the SealedSecret above.
patches:
  - target:
      kind: Secret
      name: bitesense-secrets
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: bitesense-secrets

# Tag bump per release; the Makefile updates these via `kustomize edit set image`.
images:
  - name: bitesense-backend
    newTag: v0.1.0
  - name: bitesense-frontend
    newTag: v0.1.0
