apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
# Replace the example secret from base with a real SealedSecret here:
# patches:
#   - target: { kind: Secret, name: bitesense-secrets }
#     path: secret-patch.yaml
# Tag bump per release; the Makefile sets these via `kustomize edit set image`.
images:
