# Traefik IngressRoute used by the portable overlay. Replace `bitesense.example.com`
# with your real hostname and wire it to whatever certificate resolver / TLS
# Secret your cluster uses.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bitesense
  namespace: bitesense
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`bitesense.example.com`) && PathPrefix(`/api/`)
      kind: Rule
      services:
        - name: bitesense-backend
          port: 80
    - match: Host(`bitesense.example.com`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: bitesense-frontend
          port: 80
  tls: {}
