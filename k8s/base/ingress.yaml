# Tailscale Operator picks this up (ingressClassName: tailscale) and creates a
# Tailnet node `bitesense` reachable at https://bitesense.<tailnet>.ts.net with
# an auto-issued Let's Encrypt cert.
#
# Both /api/ and / are served by the frontend pod; nginx proxies /api/ to the
# backend Service in-cluster. This mirrors the MYK/Goalbooze pattern on the
# Pi-Homelab cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bitesense
  namespace: bitesense
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: bitesense-frontend
      port:
        number: 80
  tls:
    - hosts: [bitesense]
