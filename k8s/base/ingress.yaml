# Traefik IngressRoute exposing the frontend; the backend lives under /api/v1.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bitesense
  namespace: bitesense
  annotations:
    # Exposes this route on the Tailnet via the Tailscale K8s operator.
    tailscale.com/expose: "true"
    tailscale.com/hostname: "bitesense"
spec:
  entryPoints: [websecure]
  routes:
    - match: PathPrefix(`/api/`)
      kind: Rule
      services:
        - name: bitesense-backend
          port: 80
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: bitesense-frontend
          port: 80
  tls: {}
