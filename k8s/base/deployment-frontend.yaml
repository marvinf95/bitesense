apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitesense-frontend
  namespace: bitesense
  labels:
    app.kubernetes.io/name: bitesense-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bitesense-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bitesense-frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          # Built on the Pi via `pibuild frontend bitesense-frontend:<tag>` after
          # `flutter build web` produced `web/` on the dev notebook. See Makefile.
          image: bitesense-frontend:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 96Mi }
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-tmp
          emptyDir: { medium: Memory, sizeLimit: 32Mi }
        - name: nginx-cache
          emptyDir: { medium: Memory, sizeLimit: 32Mi }
        - name: nginx-run
          emptyDir: { medium: Memory, sizeLimit: 16Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: bitesense-frontend
  namespace: bitesense
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bitesense-frontend
  ports:
    - port: 80
      targetPort: http
      name: http
