apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bitesense
resources:
  - namespace.yaml
  - pvc.yaml
  - sealed-secrets.example.yaml    # Replace with real SealedSecret in your overlay.
  - deployment-backend.yaml
  - deployment-frontend.yaml
  - ingress.yaml
  - networkpolicy.yaml

# Default to on-Pi locally-built images. Overlays override the tag (typically the
# git short SHA after a `make build-images` run). For external clusters that use
# a real registry, switch to overlays/portable which retargets to GHCR.
images:
  - name: bitesense-backend
    newTag: local
  - name: bitesense-frontend
    newTag: local
