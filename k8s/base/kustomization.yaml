apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bitesense
resources:
  - namespace.yaml
  - pvc.yaml
  - sealed-secrets.example.yaml    # Replace with real SealedSecret in your overlay.
  - deployment-backend.yaml
  - deployment-frontend.yaml
  - ingress.yaml
  - networkpolicy.yaml
images:
  - name: ghcr.io/marvinf95/bitesense-backend
    newTag: latest
  - name: ghcr.io/marvinf95/bitesense-frontend
    newTag: latest
